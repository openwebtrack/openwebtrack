name: Docker Image

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read version from package.json
        run: |
          VERSION="v$(jq -r .version package.json)"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag old :latest with its version
        run: |
          IMAGE="ghcr.io/openwebtrack/openwebtrack"
          NEW_VERSION="${{ env.VERSION }}"

          if docker pull "$IMAGE:latest" 2>/dev/null; then
            OLD_VERSION=$(docker inspect "$IMAGE:latest" \
              --format='{{ index .Config.Labels "org.opencontainers.image.version"}}')

            if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
              echo "⛔ Version $NEW_VERSION already exists as :latest — did you forget to bump package.json?"
              exit 1
            fi

            if [ -n "$OLD_VERSION" ]; then
              echo "Retagging :latest → :$OLD_VERSION"
              docker tag "$IMAGE:latest" "$IMAGE:$OLD_VERSION"
              docker push "$IMAGE:$OLD_VERSION"
            else
              echo "No version label found on old :latest — skipping retag"
            fi
          else
            echo "No existing :latest found — first build"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/openwebtrack/openwebtrack:${{ env.VERSION }}
            ghcr.io/openwebtrack/openwebtrack:latest
          labels: |
            org.opencontainers.image.version=${{ env.VERSION }}
